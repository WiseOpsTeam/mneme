---
# Oracle Linux specific variables

# Default repository URLs - conditionally set based on version
mneme_mariadb_repo_url_ol_7: "http://archive.mariadb.org/mariadb-{{ mneme_mariadb_version }}/yum/centos{{ ansible_distribution_major_version }}-amd64"
mneme_mariadb_repo_url_rocky_8_9: "http://yum.mariadb.org/{{ mneme_mariadb_version }}/rhel{{ ansible_distribution_major_version }}-amd64"

# EPEL repo - conditionally set based on version
mneme_epel_repo_archive_url: "https://archives.fedoraproject.org/pub/archive/epel/7/x86_64/Packages/e/epel-release-7-14.noarch.rpm"
mneme_epel_repo_url: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
mneme_epel_repo_key_url: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"
