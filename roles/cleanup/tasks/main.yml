---

- name: "CLEANUP | Validate input"
  ansible.builtin.assert:
    that:
      - mneme_prepare_target_date is defined
      - mneme_prepare_target_date | length > 0
    fail_msg: "variable 'mneme_prepare_target_date' is required for cleanup."

- name: "CLEANUP | Warn if runtime path not set, falling back to default"
  ansible.builtin.debug:
    msg: >-
      mneme_prepared_runtime_work_dir is not defined.
      Falling back to mneme_prepare_work_dir.
      If you are running cleanup without a preceding prepare in the same
      play, set mneme_prepare_work_dir explicitly.
  when: mneme_prepared_runtime_work_dir is not defined

- name: "CLEANUP | Remove working directory"
  ansible.builtin.file:
    path: "{{ mneme_prepared_runtime_work_dir | default(mneme_prepare_work_dir) }}"
    state: absent
  when: mneme_prepare_work_dir is defined
