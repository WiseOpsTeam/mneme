---

- name: Prepare backup artifacts for verification
  ansible.builtin.include_role:
    name: wiseops_team.mneme.prepare
  vars:
    mneme_prepare_target_date: "{{ mneme_verify_target_date }}"
    mneme_prepare_type: "{{ mneme_verify_type }}"

- name: Run backup verification drill
  wiseops_team.mneme.verify:
    backup_dir: "{{ mneme_prepared_backup_dir }}"
    database: "{{ mneme_verify_database }}"
    table: "{{ mneme_verify_tables | default(omit) }}"
    random_tables_count: "{{ mneme_verify_random_tables_count | default(omit) }}"
    validation_query: "{{ mneme_verify_validation_query }}"
    client_bin: "{{ mneme_mariadb_bin_path }}"
    dump_bin: "{{ mneme_mariadb_dump_bin_path }}"
    mysqld_bin: "{{ mneme_mysqld_bin_path }}"

- name: Cleanup verification artifacts
  ansible.builtin.include_role:
    name: wiseops_team.mneme.cleanup
  vars:
    mneme_prepare_target_date: "{{ mneme_verify_target_date }}"
