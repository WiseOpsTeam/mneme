---

name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'LICENSE.txt'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'LICENSE.txt'

env:
  ANSIBLE_ROLES_PATH: ${{ github.workspace }}/..
  ANSIBLE_FORCE_COLOR: '1'
  MOLECULE_GLOB: 'tests/molecule/*/molecule.yml'

jobs:
  lint_and_test:
    name: Lint & Molecule Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rsync build-essential

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Ansible Collections
        run: ansible-galaxy collection install community.general community.mysql

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint .

      - name: Build and install collection locally
        run: |
          ansible-galaxy collection build --force
          ansible-galaxy collection install wiseops_team-mneme-*.tar.gz --force -p ~/.ansible/collections

      - name: Debug collection install path
        run: |
          echo "=== HOME ==="
          echo $HOME
          echo "=== find collections ==="
          find ~/.ansible/collections -type f -name "*.py" | grep -E "(verify|restore)" | head -20
          echo "=== tree collections ==="
          tree ~/.ansible/collections/ansible_collections/wiseops_team/ 2>/dev/null || find ~/.ansible/collections/ansible_collections/wiseops_team/ -type f | sort
          echo "=== ANSIBLE_COLLECTIONS_PATH from molecule env ==="
          echo '$HOME/.ansible/collections'
          ls -la '$HOME/.ansible/collections' 2>&1 || echo "literal dollar-HOME path does not exist"

      - name: Run molecule test (default)
        run: molecule test -s default

      - name: Run molecule test (restore_integration)
        run: molecule test -s restore_integration

      - name: Run molecule test (partial_backup_test)
        run: molecule test -s partial_backup_test