---

# Backup paths and retention settings
mneme_backup_dir: /home/data/mneme_backups/backup
mneme_archive_dir: /home/data/mneme_backups/archive
mneme_temp_dir: /home/data/mneme_backups/tmp
mneme_log_dir: /var/log/mariabackup
mneme_data_dir: /var/lib/mysql

mneme_retention_contours:
  - type: daily
    count: 5
    schedule: "0 9 * * *"
    active: true
  - type: weekly
    count: 2
    schedule: "0 14 * * 1"
    active: false
  - type: monthly
    count: 1
    schedule: "0 19 1 * *"
    active: false
mneme_backup_cron: true
mneme_mailto_address: root@example.com

# Database connection details
mneme_mysql_user: root
mneme_mysql_host: localhost
mneme_mysql_port: 3306
mneme_socket: ""

# Mariabackup binary and behavior settings
mneme_bin_path: /usr/bin/mariadb-backup
mneme_mariadb_dump_bin_path: /bin/mariadb-dump
mneme_mariadb_bin_path: /bin/mariadb
mneme_mysqld_bin_path: /usr/sbin/mysqld
mneme_compress: true  # Enable/Disable compression of the backup
mneme_compression_level: 6 # Default compression level (1-9)
# mneme_pigz_processes: ""  # Number of pigz processes (use 'pigz -p <n>' if defined, default is number of CPUs)
mneme_nice_priority: 19  # Default nice priority
mneme_use_memory: "1G"
mneme_prepare_backup: true # If true, backup will be prepared before archiving
# If true it will install the official mariadb repo. Otherwise, it will try to use already installed one.
# IMPORTANT: Set to true if you want to let the role handle repository installation
mneme_install_repo: false

# Enable cgroup limits for backup jobs via systemd-run
mneme_use_cgroups: true
mneme_ram_soft_limit: 1G
mneme_ram_hard_limit: 3G

# Monitoring systems notification
# Legacy method
mneme_monitoring_notify_enable: false
mneme_monitoring_notify_port: 8125
mneme_monitoring_notify_ip: "127.0.0.1"
mneme_monitoring_notify_message_success: "mariabackup.status:1|g|{{ mneme_monitoring_notify_tags }}"
mneme_monitoring_notify_message_fail: "mariabackup.status:0|g|{{ mneme_monitoring_notify_tags }}"
mneme_monitoring_notify_tags: "#mariabackup:{{ inventory_hostname }}"

# Prometheus exporter method
mneme_prometheus_enabled: false
mneme_prometheus_dir: "/var/lib/node_exporter/textfile_collector"

# Safety
mneme_block_on_master: false

# Replication pause for write intensive replicas
# IMPORTANT: For slave/replica servers, it's highly recommended to enable these options
mneme_safe_slave_backup: true
mneme_safe_slave_backup_timeout: 300
mneme_safe_info: true
mneme_safe_slave_autorestore_replication: true
mneme_safe_slave_autorestore_replication_query: "START SLAVE;"

# Partial backup options
mneme_databases_include: []  # List of databases to include in the backup
mneme_databases_exclude: []  # List of databases to exclude from the backup
mneme_tables_include: ""  # Regexp of tables to include in the backup
mneme_tables_exclude: ""  # Regexp of tables to exclude from the backup
mneme_databases_schemes_include: [] # List of databases' full schemes backups to be included in a separate archive

# Archive verification
mneme_verify_archive: true        # do tar -tzf with a created archive
mneme_generate_checksum: true     #  create the sha256 checksum file

# --- Restore Configuration ---
# (optional) Working directory for restore process.
# Override it if you need to extract the archive to another disl (e.g. /mnt/huge_disk).
mneme_restore_work_dir: "{{ mneme_temp_dir }}/restore_{{ mneme_restore_target_date | default('unknown') }}"
# Target date for restoration in YYYY-MM-DD format.
# Can be set to "latest" to automatically discover the most recent backup.
# When "latest" is used:
#   1. Searches for verified .sha256 markers (Safe Mode).
#   2. Falls back to raw .tar.gz files if no checksums found (Legacy Mode).
#   3. Respects the 'mneme_restore_type' scope.
mneme_restore_target_date: "latest"
mneme_restore_prepare_timeout: 14400
# Backup type (daily, weekly, monthly)
mneme_restore_type: "daily"

# Security settings for the script
mneme_backup_script_owner: root
mneme_backup_script_group: root
mneme_backup_script_mode: '0755'
# System user to own backup files and run ephemeral mysqld (usually mysql)
mneme_system_user: "mysql"
mneme_system_group: "mysql"

mneme_mariadb_version: 11.4

# Default repository URLs for each OS supported. Normally, you don't need to override them.
# archive repo used for: Oracle Linux 7
mneme_mariadb_repo_url_ol_7: "http://archive.mariadb.org/mariadb-{{ mneme_mariadb_version }}/yum/centos{{ ansible_distribution_major_version }}-amd64"
# repo used for: Oracle Linux 8, 9 and Rocky Linux 8, 9
mneme_mariadb_repo_url_rocky_8_9: "http://yum.mariadb.org/{{ mneme_mariadb_version }}/rockylinux{{ ansible_distribution_major_version }}-amd64"
# repo used for: Red Hat Enterprise Linux 9
mneme_mariadb_repo_url_rhel_9: "http://yum.mariadb.org/{{ mneme_mariadb_version }}/rhel{{ ansible_distribution_major_version }}-amd64"

# EPEL archive repo for Oracle Linux 7
mneme_epel_repo_archive_url: "https://archives.fedoraproject.org/pub/archive/epel/7/x86_64/Packages/e/epel-release-7-14.noarch.rpm"
# EPEL repo for other OS
mneme_epel_repo_url: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
mneme_epel_repo_key_url: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"

# Xtrabackup compatibility. If true, it will omit the installation of mariabackup package, so it wouldn't fail.
# You'll have to install the xtrabackup package separately.
mneme_xtrabackup_compatibility: false